name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (optional)"
        required: false
      release_name:
        description: "Release title (optional)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Java setup
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # ⚡ Gradle cache + setup
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 🔐 Generate signing keystore (CI only)
      - name: Generate CI keystore
        run: |
          STORE_PASS=$(openssl rand -hex 16)
          KEY_ALIAS=ci-release
          KEYSTORE_PATH="$PWD/app/ci-release.keystore"

          echo "CI_KEYSTORE_PASSWORD=$STORE_PASS" >> $GITHUB_ENV
          echo "CI_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "CI_KEYSTORE_FILE=$KEYSTORE_PATH" >> $GITHUB_ENV

          keytool -genkeypair \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$STORE_PASS" \
            -keypass "$STORE_PASS" \
            -dname "CN=CI, OU=Android, O=CI, L=NA, S=NA, C=US"

      # 🔧 Make Gradle executable
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🏗 Build APK (flavor-aware)
      - name: Build Open Release APK
        env:
          ORG_GRADLE_PROJECT_ciKeystoreFile: ${{ env.CI_KEYSTORE_FILE }}
          ORG_GRADLE_PROJECT_ciKeystorePassword: ${{ env.CI_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_ciKeyAlias: ${{ env.CI_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_ciKeyPassword: ${{ env.CI_KEYSTORE_PASSWORD }}
        run: |
          ./gradlew clean assembleOpenRelease --no-daemon --stacktrace

      # 🔍 Debug (safe to keep)
      - name: List build outputs
        run: |
          echo "==== APK OUTPUTS ===="
          find app/build/outputs -type f || true

      # 📦 Locate & rename APK (robust)
      - name: Prepare APK
        run: |
          APK_PATH=$(find app/build/outputs -type f -name "*open-release*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found"
            exit 1
          fi

          echo "✅ Found APK: $APK_PATH"

          mkdir -p output
          cp "$APK_PATH" output/WPSApp.apk

      # ⬆ Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WPSApp
          path: output/WPSApp.apk

      # 🏷 Prepare release metadata
      - name: Prepare release info
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          NAME_INPUT="${{ github.event.inputs.release_name }}"

          DEFAULT_TAG="build-${{ github.run_number }}"
          TAG_NAME="${TAG_INPUT:-$DEFAULT_TAG}"

          if [ -n "$NAME_INPUT" ]; then
            RELEASE_NAME="$NAME_INPUT"
          else
            RELEASE_NAME="WPS Tester Build $TAG_NAME"
          fi

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      # 🚀 Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: output/WPSApp.apk
          generate_release_notes: true
